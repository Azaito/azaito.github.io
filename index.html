<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2 Meses Contigo 💙</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #120b1f, #1a1030, #2b1747);
  color: white;
}

h1 {
  text-align: center;
  margin-top: 40px;
  font-size: 3em;
}

p {
  text-align: center;
  max-width: 600px;
  margin: auto;
  color: #ddd;
}

.collage {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 30px;
}

.photo {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
}

.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.photo::after {
  content: attr(data-text);
  position: absolute;
  bottom: 10px;
  left: 10px;
  right: 10px;
  background: rgba(0,0,0,0.5);
  padding: 8px;
  border-radius: 10px;
  font-size: 14px;
}

/* 💖 Animación corazón */
.photo::before {
  content: "💖";
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 0;
  opacity: 0;
}

.photo.opening::before {
  animation: heart 1s ease forwards;
}

@keyframes heart {
  0% {opacity:0; font-size:0;}
  30% {opacity:1; font-size:40px;}
  60% {font-size:120px;}
  100% {opacity:0; font-size:200px;}
}

</style>
</head>

<body>

<h1>2 Meses Contigo 💙</h1>
<p>Haz clic en cada recuerdo 💖</p>

<div class="collage">

  <!-- 18 FOTOS -->
  <div class="photo" data-text="Recuerdo 1" data-audio="1.mp3"><img src="1.png"></div>
  <div class="photo" data-text="Recuerdo 2" data-audio="2.mp3"><img src="2.png"></div>
  <div class="photo" data-text="Recuerdo 3" data-audio="3.mp3"><img src="3.png"></div>
  <div class="photo" data-text="Recuerdo 4" data-audio="4.mp3"><img src="4.png"></div>
  <div class="photo" data-text="Recuerdo 5" data-audio="5.mp3"><img src="5.png"></div>
  <div class="photo" data-text="Recuerdo 6" data-audio="6.mp3"><img src="6.png"></div>
  <div class="photo" data-text="Recuerdo 7" data-audio="7.mp3"><img src="7.png"></div>
  <div class="photo" data-text="Recuerdo 8" data-audio="8.mp3"><img src="8.png"></div>
  <div class="photo" data-text="Recuerdo 9" data-audio="9.mp3"><img src="9.png"></div>
  <div class="photo" data-text="Recuerdo 10" data-audio="10.mp3"><img src="10.png"></div>
  <div class="photo" data-text="Recuerdo 11" data-audio="11.mp3"><img src="11.png"></div>
  <div class="photo" data-text="Recuerdo 12" data-audio="12.mp3"><img src="12.png"></div>
  <div class="photo" data-text="Recuerdo 13" data-audio="13.mp3"><img src="13.png"></div>
  <div class="photo" data-text="Recuerdo 14" data-audio="14.mp3"><img src="14.png"></div>
  <div class="photo" data-text="Recuerdo 15" data-audio="15.mp3"><img src="15.png"></div>
  <div class="photo" data-text="Recuerdo 16" data-audio="16.mp3"><img src="16.png"></div>
  <div class="photo" data-text="Recuerdo 17" data-audio="17.mp3"><img src="17.png"></div>
  <div class="photo" data-text="Recuerdo 18" data-audio="18.mp3"><img src="18.png"></div>

</div>

<script>
let currentAudio = null;

document.querySelectorAll('.photo').forEach(photo => {
  photo.addEventListener('click', () => {

    const audioSrc = photo.dataset.audio;

    // animación
    document.querySelectorAll('.photo').forEach(p => p.classList.remove('opening'));
    void photo.offsetWidth;
    photo.classList.add('opening');

    // parar anterior
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
    }

    // reproducir nueva
    currentAudio = new Audio(audioSrc);
    currentAudio.play();

  });
});
</script>

</body>
</html>
